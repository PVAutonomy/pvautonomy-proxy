# EXAMPLE / REFERENCE — wrangler never reads *.example.toml.
#
# As of #141e-3 the REAL `[env.canary]` block below is ALSO live in
# wrangler.toml (using the isolated KV namespaces created in #141e-2). This
# file is kept as the annotated reference for the canary shape and rationale.
#
# Wrangler environments do NOT inherit top-level [vars]/kv_namespaces — every
# binding must be redefined under the env. The Canary uses SEPARATE KV
# namespace ids (never the production ids in wrangler.toml).

[env.canary]
name = "pvautonomy-proxy-hpke-canary"

[env.canary.observability]
enabled = true

[env.canary.vars]
GITHUB_OWNER = "PVAutonomy"
GITHUB_REPO = "inverter-registry"
GITHUB_WORKFLOW_FILE = "build-firmware-on-demand.yml"
# Lower than production — canary is for validation, not customer volume.
MAX_BUILDS_PER_DAY = "2"
MAX_PAYLOAD_BYTES = "65536"
BUILD_TIMEOUT_MS = "900000"
# GITHUB_APP_* are intentionally OMITTED for #139 keyset validation so the
# canary physically cannot mint a GitHub token / dispatch a real build.
# (Re-add only when build-dispatch E2E on canary is explicitly in scope.)

# SEPARATE canary KV namespaces (created in #141e-2; titles
# pvautonomy-proxy-hpke-canary-{build-state,api-keys}). Distinct from production.
[[env.canary.kv_namespaces]]
binding = "BUILD_STATE"
id = "d928e34e235f441a989a7658d76b1191"

[[env.canary.kv_namespaces]]
binding = "API_KEYS"
id = "198c1f7255e84f8298c128807d56102e"

# Canary secrets (set via `wrangler secret put --env canary` in #141e):
#   GITHUB_APP_PRIVATE_KEY — OMIT for #139 keyset validation (no real builds).
#   HPKE_TEST_KEYSET       — the signed TEST keyset (HPKE-1 / #139), canary only.
# Seed a dedicated NON-PRODUCTION pva_ Build-Key into the canary API_KEYS
# namespace only — never a real customer key.
