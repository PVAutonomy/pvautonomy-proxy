name = "pvautonomy-proxy"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# ISSUE-6 follow-up: artifact-resolution failures are diagnosed via
# console.warn — without observability those logs are dropped, so the
# silent-null failure class would stay invisible in production.
[observability]
enabled = true

[vars]
# GHAPP-2: GitHub App auth (app "pvautonomy-proxy", installed only on
# PVAutonomy/inverter-registry with Actions:RW + Contents:RO).
GITHUB_APP_ID = "2940147"
GITHUB_APP_INSTALLATION_ID = "112192181"
GITHUB_OWNER = "PVAutonomy"
GITHUB_REPO = "inverter-registry"
GITHUB_WORKFLOW_FILE = "build-firmware-on-demand.yml"
MAX_BUILDS_PER_DAY = "10"
MAX_PAYLOAD_BYTES = "65536"
BUILD_TIMEOUT_MS = "900000"
# HPKE-3 (ADR-0003 D-A): explicit keyset tier for GET /build-backend/keys.
# "production" -> serve the HPKE_KEYSET secret and require the served
# keyset.environment == "production". The HPKE_KEYSET secret is set only in the
# future G5 Cloudflare step; until then this path returns 404 (legacy fallback
# preserved). Production never serves the canary HPKE_TEST_KEYSET.
HPKE_KEYSET_TIER = "production"

[[kv_namespaces]]
binding = "BUILD_STATE"
id = "9fc55c603d9a446dbccb242c0908555c"
preview_id = "a97405546b8b47ff9b65d69642726a41"

[[kv_namespaces]]
binding = "API_KEYS"
id = "4e5072932f4046828079ae436f57e740"
preview_id = "6f720b4d2907449d8a743428e091ce6f"

# Secrets (set via `wrangler secret put`):
# GITHUB_APP_PRIVATE_KEY — GitHub App private key as PKCS#8 PEM. GitHub
#   downloads keys in PKCS#1; convert BEFORE secret put:
#     openssl pkcs8 -topk8 -nocrypt -in app.pem -out app-pkcs8.pem

# ── Canary environment (pvautonomy-config#141, #141e) ──────────────────────
# Isolated HPKE-validation Canary. SEPARATE clean-slate worker + SEPARATE KV
# namespaces (created in #141e-2) — never the production KV ids above. The old
# `pvautonomy-proxy-canary` worker is deprecated and left untouched.
#
# GITHUB_APP_* is deliberately OMITTED so the canary cannot mint a token /
# dispatch real inverter-registry builds (#139 keyset validation needs none;
# /build fails closed). HPKE_TEST_KEYSET is set as a canary-only secret later
# (#141e-6), never here. Deploy is a separate manual step (#141e-5) via the
# `Deploy worker (canary)` workflow_dispatch.
[env.canary]
name = "pvautonomy-proxy-hpke-canary"

[env.canary.observability]
enabled = true

[env.canary.vars]
GITHUB_OWNER = "PVAutonomy"
GITHUB_REPO = "inverter-registry"
GITHUB_WORKFLOW_FILE = "build-firmware-on-demand.yml"
MAX_BUILDS_PER_DAY = "2"
MAX_PAYLOAD_BYTES = "65536"
BUILD_TIMEOUT_MS = "900000"
# HPKE-3 (ADR-0003 D-A): the canary is the TEST tier. GET /build-backend/keys
# serves the canary-only HPKE_TEST_KEYSET secret and requires the served
# keyset.environment == "test". The canary never serves a production keyset.
# Required so a future canary redeploy keeps the #139 TEST behavior.
HPKE_KEYSET_TIER = "test"

[[env.canary.kv_namespaces]]
binding = "BUILD_STATE"
id = "d928e34e235f441a989a7658d76b1191"

[[env.canary.kv_namespaces]]
binding = "API_KEYS"
id = "198c1f7255e84f8298c128807d56102e"
